# Cron job: fetch DOJI gold XML feed and commit the parsed JSON snapshot.
#
# Data flows:
#   DOJI XML (public feed)  --node parse-->  gold.json  --commit-->  Pages
#
# The E1002 static page reads gold.json (same origin, no CORS), computes the
# %Δ vs yesterday, and renders 800×480. Because the fetch happens in this
# workflow (not the browser) we never touch cross-origin restrictions.
#
# Runs at 09:00 and 15:00 Asia/Ho_Chi_Minh (02:00 and 08:00 UTC) so the E1002
# has a fresh snapshot after the shop opens and after the mid-day update.

name: Update gold price

on:
  # 02:00 UTC = 09:00 VN, 08:00 UTC = 15:00 VN.
  schedule:
    - cron: "0 2,8 * * *"
  # Manual trigger for one-off refreshes.
  workflow_dispatch: {}
  # Also refresh when we change the fetcher itself.
  push:
    branches: [main, seedstudio-e1002-lunar-calendar]
    paths:
      - ".github/workflows/update-gold-price.yml"
      - "scripts/fetch-gold-price.mjs"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch DOJI XML → gold.json
        run: node scripts/fetch-gold-price.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet e1002-extras/gold-price-vn/data/gold.json; then
            echo "No price change, skipping commit."
            exit 0
          fi
          git config user.name  "gold-price-bot"
          git config user.email "gold-price-bot@users.noreply.github.com"
          git add e1002-extras/gold-price-vn/data/gold.json
          git commit -m "chore(gold): update snapshot $(date -u +%FT%TZ)"
          git push
