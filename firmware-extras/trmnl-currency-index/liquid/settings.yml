# yamllint disable rule:line-length
# Frankfurter (ECB) free FX API. No key required.
# URL pattern: /v1/<start>..<end>?base=<X>&symbols=<list>
# 30-day window: 'now' - 2592000s, formatted as YYYY-MM-DD.
---
strategy: polling
no_screen_padding: "no"
dark_mode: "no"
static_data: ""
polling_verb: get
framework_version: latest
serverless_language: ""
polling_url: |
  https://api.frankfurter.dev/v1/{{ 'now' | date: '%s' | minus: 2592000 | date: '%Y-%m-%d' }}..{{ 'now' | date: '%Y-%m-%d' }}?base={{ trmnl.plugin_settings.custom_fields_values.base_currency | default: 'USD' }}&symbols={{ trmnl.plugin_settings.custom_fields_values.currencies | default: 'EUR,GBP,JPY,CAD,AUD,CNY' }}
polling_headers: ""
polling_body: ""
custom_fields:
  - keyname: base_currency
    field_type: string
    name: Base currency
    description: ISO 4217 code (e.g. USD, EUR, GBP). Default USD.
    placeholder: USD
  - keyname: currencies
    field_type: string
    name: Symbols (comma separated)
    description: Up to 6 ISO codes shown in the table. Default EUR,GBP,JPY,CAD,AUD,CNY.
    placeholder: EUR,GBP,JPY,CAD,AUD,CNY
  - keyname: about
    name: About This Plugin
    category: finance
    field_type: author_bio
    description: >-
      Currency index dashboard: 30-day base-vs-symbols rates from Frankfurter (ECB free API).
      Pure HTML/CSS table — no JavaScript, no external CDN.
      Optimised for 400x300 mono e-ink (Waveshare ESP32-S3-RLCD-4.2).
    email_address: ""
name: Currency Index
refresh_interval: 5
